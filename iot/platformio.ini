; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:yolo_uno]
platform = espressif32
board = yolo_uno
framework = arduino
monitor_speed = 115200
; Keep DTR/RTS low so opening the monitor doesn't inadvertently reset the board
monitor_dtr = 0
monitor_rts = 0
; Add timestamp filter to help spot restarts and ensure monitor stays useful across resets
monitor_filters = time
; Allow monitor to follow the device even if Windows assigns a different COM after reset
monitor_port = COM[0-9]+
build_flags = 
	-D ARDUINO_USB_MODE=1
	-D ARDUINO_USB_CDC_ON_BOOT=1
lib_deps = 
	h2zero/NimBLE-Arduino@^2.3.6
	adafruit/Adafruit PN532@^1.3.4
